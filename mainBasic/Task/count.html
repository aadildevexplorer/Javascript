<!doctype html>
<html>
  <head>
    <title>JS Counter</title>
  </head>
  <body>
    <h1 id="count">0</h1>
    <button id="btn">Increase</button>

    <script>
      let count = 0;

      const button = document.getElementById("btn");

      //   button.addEventListener("click", () => {
      //     count++; // 🔥 Memory me value increase
      //     console.log(count); // Console me change dikhega
      //     // ❌ But UI update nahi kiya

      //    ye UI  update kiya h manually
      button.addEventListener("click", () => {
        count++;
        document.getElementById("count").innerText = count;
      });
    </script>
  </body>
</html>
